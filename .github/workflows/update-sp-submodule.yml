name: Update SourcePawn Submodule

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Configure git for private submodule
        run: |
          git config --global url."https://${{ secrets.PRIVATE_SP_REPO_TOKEN }}@github.com/SCP-076/".insteadOf "https://github.com/SCP-076/"

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync sourcepawn submodule
        run: |
          git submodule sync sourcepawn

      - name: Init and update sourcepawn to latest spp-dev
        run: |
          git submodule update --init sourcepawn
          cd sourcepawn
          git fetch origin refs/heads/spp-dev:refs/remotes/origin/spp-dev
          cd ..
          git submodule update --remote sourcepawn

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet sourcepawn; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in sourcepawn submodule, skipping commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git add sourcepawn
          git commit -m "chore: update sourcepawn submodule to latest spp-dev"
          git push origin master
