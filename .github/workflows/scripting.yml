name: SourcePawn scripting
on: 
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            os_short: linux
          - os: windows-latest
            os_short: win
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      ARCH: x86,x86_64
    steps:
      - name: Configure git for private submodule
        run: |
          git config --global url."https://${{ secrets.PRIVATE_SP_REPO_TOKEN }}@github.com/SCP-076/".insteadOf "https://github.com/SCP-076/"

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Setup Python for AMBuild
      - uses: actions/setup-python@v6
        name: Setup Python 3.12
        with:
          python-version: 3.12
      - name: Install AMBuild
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install git+https://github.com/alliedmodders/ambuild

      - name: Install Linux dependencies
        if: startsWith(runner.os, 'Linux')
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev libc6-dev-i386 linux-libc-dev \
            linux-libc-dev:i386 lib32z1-dev ${{ matrix.compiler_cc }}

      - name: Select clang compiler
        if: startsWith(runner.os, 'Linux')
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          clang --version
          clang++ --version

      - name: Build
        shell: bash
        run: |
          mkdir build
          cd build
          python ../configure.py --enable-optimize --scripting-only --targets=${{ env.ARCH }}
          ambuild
          echo "SM_VERSION=$(cat ../product.version)" >> $GITHUB_ENV

      - name: Archive tooling
        uses: actions/upload-artifact@v7
        with:
          name: sourcemod-tooling-${{ env.SM_VERSION }}-${{ matrix.os_short }}
          path: build/package
